[workspace]
name = "unitree_go2_ros2"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
colcon-common-extensions = "*"
cmake = "*"
pkg-config = "*"
ninja = "*"
setuptools = "<=58.2.0"
python = "3.10.*"
lark = ">=1.3.1,<2"

[activation]
scripts = ["setup.sh"]

[tasks]
build = "colcon build --symlink-install"
